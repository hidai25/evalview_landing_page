  <!-- SPA redirect handler for GitHub Pages (reads ?p= set by 404.html) -->
  <script>
    (function() {
      var redirect = window.location.search.slice(1);
      if (redirect.startsWith('p=/')) {
        var path = redirect.slice(2).split('&q=').map(function(s) {
          return decodeURIComponent(s.replace(/~and~/g, '&'));
        });
        var newUrl = window.location.protocol + '//' + window.location.host +
          path[0] + (path[1] ? '?' + path[1] : '') + window.location.hash;
        window.history.replaceState(null, null, newUrl);
      }
    })();
  </script>
