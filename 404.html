<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — EvalView</title>
    <meta name="robots" content="noindex">
    <script>
      // Single-Page Apps for GitHub Pages
      // Redirect all 404s back to index.html while preserving the path.
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body style="max-width:600px;margin:60px auto;padding:20px;font-family:system-ui,sans-serif;color:#f8fafc;background:#000;line-height:1.6;">

      </ul>
    </nav>

  </body>
</html>
